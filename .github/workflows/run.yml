name: Industry & Company Report Bot

on:
  schedule:
    - cron: '0 23,1,3,5,7,9 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run bot
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }} # 금고에서 꺼내오기
        run: python bot.py

      - name: Save memory
        run: |
          git config user.name "GitHub Action Bot"
          git config user.email "action@github.com"
          git add last_title.txt
          git commit -m "Update last report" || echo "No changes"
          git push
